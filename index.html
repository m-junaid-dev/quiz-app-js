    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Open+Sans:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

        }

        html {
    scroll-behavior: smooth;
}


        .container {
            height: auto;
            /* min-width: 500px; */
            min-width: 500px;
            padding: 30px;
            background-color: rgb(31, 173, 255);
            position: absolute;
            left: 50%;
            top: 70px;
            transform: translateX(-50%);
            border-radius: 10px;

        }

        /* this class for container          */
        .conta{
            transition: 0.3s ease-in;
            transform: translateX(-630px);
            top: 50px;

        }
        /* .conta:hover{
            transform: translateX(-500px);

        .container h1 {
            color: rgb(238, 235, 39);

            font-size: 40px;
        }

        hr {
            margin-top: 10px;
            width: 100.5%;
            padding: 0;
            position: absolute;
            right: -1px;

        }

        .qs {
            margin-top: 35px;
            padding: 10px;

        }

        .qs h2 {
            padding-bottom: 15px;
            color: white;
        }

        .qs label {

        }

        .btn {

            height: 40px;
            background-color: yellow;
            border: none;
            border-radius: 4px;
            margin: 60px 0 20px 0;
            font-size: 25px;
            font-family: sans-serif;

        .numbers{
